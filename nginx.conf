# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name rfp.naughtid.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rfp.naughtid.com;

    ssl_certificate     /etc/letsencrypt/live/rfp.naughtid.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rfp.naughtid.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 110M;

    # SSE and streaming endpoints — no buffering
    # Matches: /api/rfp/.../process, /api/rfp/.../rerun, /api/rfp/.../demo-prep
    #          /api/kb/.../ingest, /api/kb/upload-document
    location ~ ^/api/(rfp|kb)/.*(process|ingest|demo-prep|rerun|upload-document) {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';

        proxy_buffering           off;
        proxy_cache               off;
        chunked_transfer_encoding on;

        proxy_read_timeout  310s;
        proxy_send_timeout  310s;
    }

    # Catch the discover/run endpoint (path structure differs from above pattern)
    location ~ ^/api/discover/run {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';

        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_read_timeout  310s;
        proxy_send_timeout  310s;
    }

    # All other requests
    location / {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }
}
