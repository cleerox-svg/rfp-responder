server {
    listen 80;
    server_name _;

    client_max_body_size 110M;

    # SSE and streaming endpoints — no buffering
    # Matches: /api/rfp/.../process, /api/rfp/.../rerun, /api/rfp/.../demo-prep
    #          /api/kb/.../ingest, /api/kb/upload-document, /api/discover/run
    location ~ ^/api/(rfp|kb)/.*(process|ingest|demo-prep|rerun|upload-document|discover/run) {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';

        # SSE requires buffering disabled — without this, agent progress streams
        # are held in Nginx's buffer and the UI appears frozen until the stream ends.
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_read_timeout  310s;
        proxy_send_timeout  310s;
    }

    # Catch the discover/run endpoint (path structure differs from above pattern)
    location ~ ^/api/discover/run {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';

        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_read_timeout  310s;
        proxy_send_timeout  310s;
    }

    # All other requests
    location / {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }
}
