version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_PATH=/data/naughtrfp.db
      - UPLOAD_FOLDER=/data/uploads
      - EXPORTS_DIR=/data/exports
      - FLASK_DEBUG=false
      - PORT=5000
    volumes:
      - naughtrfp_data:/data
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/kb/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  naughtrfp_data:
    driver: local
