# nginx-init.conf — used only during initial Certbot cert issuance
# Start with: docker compose -f docker-compose-init.yml up -d
#
# This config serves the ACME challenge on port 80 so Certbot can verify
# domain ownership. After certs are issued, switch to nginx.conf (full SSL).
server {
    listen 80;
    server_name rfp.naughtid.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'NaughtRFP is starting up...';
        add_header Content-Type text/plain;
    }
}
